<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>กุยช่ายสวรรค์ — แดชบอร์ดยอดขาย (Supabase)</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@500;700;800&family=Sarabun:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{ --yellow:#E6B83C; --cream:#FFFCEF; --ink:#143D26; --line:#ECE6D6; --muted:#8A8170; --green:#1a7f37; --red:#E63329; }
  *{ box-sizing:border-box; }
  body{ margin:0; background:#FAF8F1; color:var(--ink); font-family:"Sarabun",sans-serif; padding:16px; }
  .wrap{ max-width:560px; margin:0 auto; }
  .head{ text-align:center; margin-bottom:12px; }
  .head h1{ font-family:"Kanit"; font-weight:800; font-size:20px; margin:6px 0 2px; }
  .head .sub{ color:var(--muted); font-size:13px; }
  .badge{ display:inline-block; background:var(--yellow); color:var(--ink); font-family:"Kanit"; font-weight:700; font-size:12px; padding:3px 12px; border-radius:999px; }
  .ranges{ display:flex; gap:7px; justify-content:center; margin:12px 0; flex-wrap:wrap; }
  .ranges button{ border:1px solid var(--line); background:#fff; color:var(--ink); font-family:"Sarabun"; font-size:13px; padding:6px 14px; border-radius:999px; cursor:pointer; }
  .ranges button.on{ background:var(--ink); color:var(--yellow); border-color:var(--ink); font-weight:700; }
  .speed{ text-align:center; font-size:12px; color:var(--muted); margin-bottom:12px; }
  .speed b{ color:var(--green); }
  .kpis{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px; }
  .kpi{ background:#fff; border:1px solid var(--line); border-radius:14px; padding:12px 14px; }
  .kpi .lbl{ font-size:12px; color:var(--muted); }
  .kpi .val{ font-family:"Kanit"; font-weight:800; font-size:21px; margin-top:2px; }
  .kpi .val.neg{ color:var(--red); }
  .kpi .sub{ font-size:11.5px; color:var(--muted); margin-top:2px; }
  .card{ background:#fff; border:1px solid var(--line); border-radius:14px; padding:14px; margin-bottom:12px; }
  .card h2{ font-family:"Kanit"; font-weight:700; font-size:15px; margin:0 0 10px; }
  .bar-row{ display:flex; align-items:center; gap:8px; margin:6px 0; font-size:13px; }
  .bar-row .nm{ width:72px; flex-shrink:0; color:var(--muted); }
  .bar-wrap{ flex:1; background:#F3ECD8; border-radius:6px; height:18px; overflow:hidden; }
  .bar{ height:100%; background:var(--yellow); border-radius:6px; }
  .bar.best{ background:#2E9E5B; }
  .bar.deliv{ background:#7BAE7F; }
  .bar-row .vl{ width:74px; text-align:right; font-family:"Kanit"; font-weight:600; }
  .daily{ max-height:230px; overflow-y:auto; }
  .daily .d{ display:flex; justify-content:space-between; padding:6px 2px; border-bottom:1px dashed var(--line); font-size:13px; }
  .err{ background:#FEF2F2; color:#B91C1C; border:1px solid #FCA5A5; border-radius:12px; padding:12px; font-size:13px; }
  .foot{ text-align:center; color:var(--muted); font-size:11.5px; margin-top:10px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div class="badge">🥟 Supabase</div>
    <h1>แดชบอร์ดยอดขาย</h1>
    <div class="sub">กุยช่ายสวรรค์ · ฐานข้อมูลใหม่ (PostgreSQL)</div>
  </div>
  <div class="ranges" id="ranges">
    <button data-r="7">7 วัน</button>
    <button data-r="30">30 วัน</button>
    <button data-r="month">เดือนนี้</button>
    <button data-r="all" class="on">ทั้งหมด</button>
  </div>
  <div class="speed" id="speed">กำลังโหลด...</div>
  <div id="content"></div>
  <div class="foot">อ่านอย่างเดียวจาก Supabase · ไม่ต้องล็อกอิน</div>
</div>

<script>
// ============================================================
// ⚠️  กุยช่ายสวรรค์ — แก้ URL + KEY ตรงนี้เมื่อมี Supabase ของแบรนด์ใหม่
//    ตอนนี้ยังชี้ไปฐานข้อมูลเดิมของ Maru (ข้อมูลจะปนกัน)
// ============================================================
const SUPABASE_URL = 'https://nmrdgdzlraxffcaizclr.supabase.co';
const SUPABASE_KEY = 'sb_publishable_mWMlYxXgd1CwcJAV3eLkwg__fUKXxSZ';
const DOW = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];
const CH = [
  {k:'cash',label:'เงินสด',g:'store'},{k:'transfer',label:'เงินโอน',g:'store'},{k:'thaihelp',label:'ไทยช่วยไทย',g:'store'},
  {k:'lineman',label:'LineMan',g:'deliv'},{k:'grab',label:'Grab',g:'deliv'},{k:'shopee',label:'ShopeeFood',g:'deliv'},{k:'robinhood',label:'Robinhood',g:'deliv'}
];
let SALES = [], EXP = [], curRange = 'all';

function baht(n){ return '฿' + Math.round(Number(n)||0).toLocaleString('en-US'); }
function thDate(s){ const M=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.']; const p=String(s).split('-'); return parseInt(p[2])+' '+M[parseInt(p[1])-1]; }
function fmtD(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }

async function sbGet(path){
  const res = await fetch(SUPABASE_URL+'/rest/v1/'+path, { headers:{ apikey:SUPABASE_KEY, Authorization:'Bearer '+SUPABASE_KEY } });
  if(!res.ok) throw new Error('HTTP '+res.status+' — '+(await res.text()).slice(0,180));
  return res.json();
}

async function loadAll(){
  const t0 = performance.now();
  try{
    const [s,e] = await Promise.all([
      sbGet('sales?select=*&order=sale_date.asc'),
      sbGet('expenses?select=exp_date,amount&order=exp_date.asc')
    ]);
    SALES = s; EXP = e;
    const ms = Math.round(performance.now()-t0);
    document.getElementById('speed').innerHTML = 'โหลดจาก Supabase ใน <b>'+ms+' ms</b> ⚡';
    render();
  }catch(err){
    document.getElementById('speed').textContent='';
    document.getElementById('content').innerHTML = '<div class="err">โหลดไม่สำเร็จ: '+err.message+'<br><br>เช็ก: รัน SQL เปิดอ่าน sales + expenses แล้วหรือยัง</div>';
  }
}

function startDate(){
  if(curRange==='all') return '0000-01-01';
  const now = new Date();
  if(curRange==='month') return fmtD(new Date(now.getFullYear(), now.getMonth(), 1));
  const n = parseInt(curRange,10);
  return fmtD(new Date(now.getTime() - (n-1)*86400000));
}

function render(){
  const sd = startDate();
  const sales = SALES.filter(function(r){ return r.sale_date >= sd; });
  const exp = EXP.filter(function(r){ return r.exp_date >= sd; });
  if(!sales.length){ document.getElementById('content').innerHTML = '<div class="err">ไม่มีข้อมูลยอดขายในช่วงนี้</div>'; return; }

  let totalSales=0, totalExp=0, dSum=[0,0,0,0,0,0,0], dCnt=[0,0,0,0,0,0,0], chan={};
  CH.forEach(function(c){ chan[c.k]=0; });
  sales.forEach(function(r){
    const v = Number(r.total)||0; totalSales += v;
    const di = new Date(r.sale_date+'T00:00:00+07:00').getDay();
    dSum[di]+=v; dCnt[di]++;
    CH.forEach(function(c){ chan[c.k] += Number(r[c.k])||0; });
  });
  exp.forEach(function(r){ totalExp += Number(r.amount)||0; });

  const days = sales.length, avg = totalSales/days, net = totalSales-totalExp;
  const ratio = totalSales>0 ? (totalExp/totalSales*100) : 0;
  let bestI=-1, bestAvg=-1, dowAvg=[];
  for(let i=0;i<7;i++){ const a=dCnt[i]?dSum[i]/dCnt[i]:0; dowAvg[i]=a; if(dCnt[i]>0&&a>bestAvg){bestAvg=a;bestI=i;} }
  const mxDow = Math.max.apply(null,dowAvg);
  const mxChan = Math.max.apply(null, CH.map(function(c){ return chan[c.k]; }));

  let html = '<div class="kpis">'
    + kpi('ยอดขายรวม', baht(totalSales), days+' วัน')
    + kpi('GPM', baht(net), 'ค่าใช้จ่าย '+baht(totalExp), net<0)
    + kpi('เฉลี่ย/วัน', baht(avg), 'ค่าใช้จ่าย '+ratio.toFixed(0)+'% ของยอด')
    + kpi('วันขายดีประจำ', bestI>=0?('วัน'+DOW[bestI]):'-', bestI>=0?('เฉลี่ย '+baht(dowAvg[bestI])+'/วัน'):'')
    + '</div>';

  html += '<div class="card"><h2>ยอดขายเฉลี่ยตามวันในสัปดาห์</h2>';
  for(let i=0;i<7;i++){
    const w = mxDow>0?Math.round(dowAvg[i]/mxDow*100):0;
    html += '<div class="bar-row"><div class="nm">'+DOW[i]+'</div><div class="bar-wrap"><div class="bar'+(i===bestI?' best':'')+'" style="width:'+w+'%"></div></div><div class="vl">'+baht(dowAvg[i])+'</div></div>';
  }
  html += '</div>';

  html += '<div class="card"><h2>ยอดขายตามช่องทาง</h2>';
  CH.slice().sort(function(a,b){ return chan[b.k]-chan[a.k]; }).forEach(function(c){
    if(chan[c.k]<=0) return;
    const w = mxChan>0?Math.round(chan[c.k]/mxChan*100):0;
    html += '<div class="bar-row"><div class="nm">'+c.label+'</div><div class="bar-wrap"><div class="bar'+(c.g==='deliv'?' deliv':'')+'" style="width:'+w+'%"></div></div><div class="vl">'+baht(chan[c.k])+'</div></div>';
  });
  html += '</div>';

  html += '<div class="card"><h2>ยอดขายรายวัน</h2><div class="daily">';
  sales.slice().reverse().forEach(function(r){
    html += '<div class="d"><span>'+thDate(r.sale_date)+'</span><b>'+baht(r.total)+'</b></div>';
  });
  html += '</div></div>';

  document.getElementById('content').innerHTML = html;
}

function kpi(l,v,s,neg){ return '<div class="kpi"><div class="lbl">'+l+'</div><div class="val'+(neg?' neg':'')+'">'+v+'</div><div class="sub">'+(s||'')+'</div></div>'; }

document.getElementById('ranges').addEventListener('click', function(e){
  if(e.target.tagName!=='BUTTON') return;
  curRange = e.target.getAttribute('data-r');
  [].forEach.call(this.querySelectorAll('button'), function(b){ b.classList.toggle('on', b===e.target); });
  render();
});

loadAll();
</script>
</body>
</html>
