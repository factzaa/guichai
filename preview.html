<!doctype html><html lang="th"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>พรีวิว หน้าแรก · กุยช่ายสวรรค์</title>
<link rel="stylesheet" href="shared.css">
<style>
body{margin:0;background:#EFE7D2;font-family:'Kanit','Sarabun',sans-serif;}
.frame{max-width:412px;margin:16px auto;box-shadow:0 8px 30px rgba(0,0,0,.2);border-radius:24px;overflow:hidden;background:#F7F1E1;min-height:80vh;}
.dic svg{width:32px;height:32px;color:#143D26;}
.qa-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:14px;}
.qa{background:#fff;border-radius:17px;border:1px solid #F0E8D6;padding:14px 6px;display:flex;flex-direction:column;align-items:center;gap:6px;text-decoration:none;}
.qa .ic{width:48px;height:48px;display:grid;place-items:center;}
.qa .lbl{font-weight:600;font-size:12px;color:#2A2A2A;text-align:center;line-height:1.25;}
.dl-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:0 14px 16px;}
.dl-grid a{background:#fff;border:1px solid #F0E8D6;padding:11px 12px;border-radius:15px;text-decoration:none;color:#2A2A2A;font-weight:600;font-size:12.5px;display:flex;align-items:center;gap:9px;}
.dl-grid a .dic svg{width:24px;height:24px;color:#143D26;}
.dl-grid a .dic{flex:none;display:grid;place-items:center;}
.sec-h{font-weight:700;color:#143D26;padding:4px 16px;font-size:14px;}
.fab{position:absolute;right:18px;bottom:18px;width:60px;height:60px;border-radius:50%;box-shadow:0 6px 18px rgba(0,0,0,.28);overflow:hidden;background:#143D26;}
.fab img{width:100%;height:100%;object-fit:cover;}
.wrap{position:relative;}
.note{text-align:center;font-size:12px;color:#7a6f57;padding:6px 0 14px;}
</style></head>
<body>
<div class="note">พรีวิวหน้าแรก (ความกว้างมือถือ 412px) · โลโก้ = clamp(150px,44vw,200px)</div>
<div class="frame"><div class="wrap">
  <div class="head" style="padding:0;background:#FEF7EB;border-radius:0 0 28px 28px;overflow:hidden;">
    <img src="header.png" alt="กุยช่ายสวรรค์" style="width:100%;display:block;">
    <div class="sub" style="color:#0B5A31;font-weight:600;padding:2px 0 12px;">ระบบบริหารร้าน</div>
  </div>
  <div class="qa-grid">
    <a class="qa"><div class="ic"><span class="dic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg></span></div><div class="lbl">เช็คอิน<br>เข้างาน</div></a>
    <a class="qa"><div class="ic"><span class="dic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="4" width="14" height="17" rx="2"/><path d="M9 4V3h6v1"/><path d="M9 11h6"/><path d="M9 15h4"/></svg></span></div><div class="lbl">บันทึก<br>ยอดวันนี้</div></a>
    <a class="qa"><div class="ic"><span class="dic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l2-5h14l2 5"/><path d="M5 9v11a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V9"/><path d="M9 21V12h6v9"/></svg></span></div><div class="lbl">ตรวจ<br>สต๊อก</div></a>
    <a class="qa"><div class="ic"><span class="dic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14v5a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-5"/><path d="M12 3v12"/><path d="M8 11l4 4 4-4"/></svg></span></div><div class="lbl">รับ<br>ของเข้า</div></a>
  </div>
  <div class="sec-h">📊 ดูข้อมูลเชิงลึก</div>
  <div class="dl-grid">
    <a><span class="dic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="20" x2="6" y2="12"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="18" y1="20" x2="18" y2="9"/><line x1="3" y1="20" x2="21" y2="20"/></svg></span>แดชบอร์ดยอดขาย</a>
    <a><span class="dic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3 3 8l9 5 9-5-9-5z"/><path d="M3 13l9 5 9-5"/></svg></span>แดชบอร์ดสต๊อก</a>
    <a><span class="dic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3.2"/><path d="M3.5 20a5.5 5.5 0 0 1 11 0"/><path d="M16 5.2a3 3 0 0 1 0 5.8"/><path d="M18.5 20a5 5 0 0 0-2.8-4.5"/></svg></span>รายงานเข้า-ออก</a>
    <a><span class="dic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12A9 9 0 1 0 12 21"/><path d="M12 3v9h9a9 9 0 0 0-9-9z"/></svg></span>รายงานค่าใช้จ่าย</a>
  </div>
  <div class="fab"><img src="maru-chick.png" alt=""></div>
</div></div>
</body></html>
