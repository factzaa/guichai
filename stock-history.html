<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>ประวัติเคลื่อนไหวสต๊อก · กุยช่ายสวรรค์</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0B5A31">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700;800&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
.filterbar{background:#fff;border-radius:14px;padding:12px 14px;margin-bottom:12px;box-shadow:0 2px 8px rgba(120,86,0,.06);}
.filterbar .rowd{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:9px;}
.filterbar label{font-family:'Kanit';font-weight:600;font-size:12.5px;color:var(--ink-2);}
.filterbar input[type=date]{flex:1;min-width:120px;border:1.5px solid var(--line);border-radius:10px;padding:8px 10px;font-family:'Sarabun';font-size:14px;background:#FFFDF6;color:var(--ink);}
.presets{display:flex;gap:6px;flex-wrap:wrap;}
.presets .pg{border:1.5px solid var(--line);background:#fff;border-radius:9px;padding:7px 12px;font-size:12.5px;font-weight:600;font-family:'Sarabun';cursor:pointer;color:var(--ink);}
.presets .pg.on{background:linear-gradient(180deg,#EEC85E,#CBA236);color:#12351F;border-color:#C6982A;}
.catchips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.catchips .cc{border:1.5px solid var(--line);background:#fff;border-radius:20px;padding:7px 13px;font-size:12.5px;font-weight:600;font-family:'Kanit';cursor:pointer;color:var(--ink);white-space:nowrap;}
.catchips .cc.on{background:#143D26;color:#E6B83C;border-color:#143D26;}
.daycard{background:#fff;border-radius:14px;margin-bottom:12px;box-shadow:0 2px 8px rgba(120,86,0,.07);overflow:hidden;}
.daycard .dh{display:flex;align-items:center;gap:8px;padding:11px 14px;background:linear-gradient(180deg,#F6F0DB,#F1E9CE);border-bottom:1px solid var(--line);}
.daycard .dh .dd{font-family:'Kanit';font-weight:800;font-size:15px;color:#143D26;}
.daycard .dh .dw{font-size:12px;color:#8A6A00;}
.daycard .dh .ds{margin-left:auto;font-size:11.5px;color:var(--ink-2);text-align:right;line-height:1.4;}
.daycard .dh .ds .r{color:#15803D;font-weight:700;} .daycard .dh .ds .o{color:#B91C1C;font-weight:700;}
.irow{padding:9px 14px;border-bottom:1px dashed #F0E4C4;}
.irow:last-child{border-bottom:0;}
.irow .nm{font-family:'Kanit';font-weight:600;font-size:13.5px;color:var(--ink);display:flex;align-items:center;gap:7px;}
.irow .nm .ct{font-size:10px;color:#9A8C6E;font-weight:600;background:#F2EEDD;padding:1px 7px;border-radius:7px;}
.irow .mv{display:flex;gap:7px;flex-wrap:wrap;margin-top:4px;font-size:12.5px;font-family:'Kanit';}
.irow .mv .seg{background:#FFFCEF;border:1px solid var(--line);border-radius:8px;padding:2px 9px;color:var(--ink-2);}
.irow .mv .seg b{color:var(--ink);font-weight:700;}
.irow .mv .seg.recv b{color:#15803D;} .irow .mv .seg.out b{color:#B91C1C;} .irow .mv .seg.waste b{color:#B8891F;}
.irow .mv .seg.bal{background:#ECFDF5;border-color:#A7F3D0;} .irow .mv .seg.bal b{color:#059669;}
.empty{text-align:center;color:var(--ink-2);padding:30px 12px;font-size:14px;}
.tblwrap{overflow-x:auto;border-radius:12px;border:1px solid var(--line);}
table.htbl{width:100%;border-collapse:collapse;font-family:'Sarabun';font-size:12.5px;}
table.htbl th,table.htbl td{border:1px solid var(--line);padding:6px 9px;text-align:right;white-space:nowrap;}
table.htbl th{background:#F6F0DB;color:#5A4A00;font-weight:700;}
table.htbl td.l,table.htbl th.l{text-align:left;}
table.htbl td.dt{font-weight:700;color:#143D26;}
table.htbl td.r{color:#15803D;}table.htbl td.o{color:#155E38;}table.htbl td.w{color:#B45309;}
</style>
</head>
<body>
<div class="app">
  <div class="head">
    <h1>ประวัติเคลื่อนไหวสต๊อก</h1>
    <div class="sub">กุยช่ายสวรรค์ · เริ่มต้น · รับเข้า · เบิก · คงเหลือ รายวัน</div>
  </div>
  <div class="sheet">
    <div class="filterbar">
      <div class="rowd"><label>จาก</label><input type="date" id="fStart"><label>ถึง</label><input type="date" id="fEnd"></div>
      <div class="presets" id="presets">
        <button class="pg" data-r="7">7 วัน</button>
        <button class="pg" data-r="30">30 วัน</button>
        <button class="pg on" data-r="month">เดือนนี้</button>
      </div>
    </div>
    <div class="catchips" id="catChips">
      <button class="cc on" data-cat="all">ทั้งหมด</button>
      <button class="cc" data-cat="Waffle">🧁 Waffle</button>
      <button class="cc" data-cat="KUFF">🥐 KUFF</button>
      <button class="cc" data-cat="Drink">🥤 Drink</button>
      <button class="cc" data-cat="Other">📦 อื่นๆ</button>
    </div>
    <div class="vbar">
      <div class="vtog" id="vtog"><button class="vb on" data-v="card">การ์ด</button><button class="vb" data-v="table">ตาราง</button></div>
      <div style="display:flex;gap:6px;"><button class="csvb print" id="histPrintBtn">🖨️ พิมพ์</button><button class="csvb" id="csvBtn">⬇️ CSV</button></div>
    </div>
    <div id="histBody"><div class="empty">กำลังโหลด...</div></div>
    <div class="foot">🥟 แสดงเฉพาะวัน/รายการที่มีความเคลื่อนไหว (รับเข้า/เบิก/ของเสีย)</div>
  </div>
</div>

<script src="shared.js"></script>
<script>
injectShell('stockHistory');
registerSW();
var $ = function(id){ return document.getElementById(id); };
var st = { start:'', end:'', cat:'all' };
var lastDays = [], viewMode = 'card';

function fmtD(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function setRange(r){
  var end = new Date(), start = new Date();
  if(r === 'month'){ start = new Date(end.getFullYear(), end.getMonth(), 1); }
  else { start.setDate(end.getDate() - (parseInt(r)-1)); }
  $('fStart').value = fmtD(start); $('fEnd').value = fmtD(end);
  st.start = $('fStart').value; st.end = $('fEnd').value;
}
function esc(x){ return String(x==null?'':x).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function n(x){ var v=Math.round((Number(x)||0)*100)/100; return (v%1===0)? String(v) : v.toFixed(2); }

var DOW = (typeof SB_DOW !== 'undefined') ? SB_DOW : ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];
function dm(s){ var p=String(s).split('-'); return p[2]+'/'+p[1]+'/'+p[0]; }
async function fetchAllRows(path){
  var all=[], from=0, page=1000;
  for(var g=0; g<50; g++){
    var res=await fetch(SB_URL+'/rest/v1/'+path,{ headers:{ apikey:SB_KEY, Authorization:'Bearer '+SB_KEY, 'Range-Unit':'items', Range: from+'-'+(from+page-1) } });
    if(!res.ok) throw new Error('Supabase '+res.status);
    var rows=await res.json(); if(!rows||!rows.length) break;
    all=all.concat(rows); if(rows.length<page) break; from+=page;
  }
  return all;
}
async function load(){
  $('histBody').innerHTML = '<div class="empty">กำลังโหลด...</div>';
  try{
    var CR={ Waffle:0, KUFF:1, Drink:2, Other:3, Others:3 };
    var items=await fetchAllRows('stock_items?select=item_id,name,category,sort_order,unit');
    var meta={}; items.forEach(function(r){ meta[r.item_id]={ name:r.name, category:r.category, order:Number(r.sort_order)||0, unit:r.unit }; });
    var daily=await fetchAllRows('stock_daily?select=*&order=move_date.asc,created_at.asc');
    var start=st.start, end=st.end, cat=st.cat;
    var byDate={};
    daily.forEach(function(r){
      var m=meta[r.item_id]; if(!m) return;
      var dt=r.move_date; if(!dt) return;
      if(start && dt<start) return; if(end && dt>end) return;
      if(cat!=='all' && m.category!==cat) return;
      var recv=Number(r.receive_total)||0, used=Number(r.used)||0, waste=Number(r.waste)||0, wdt=Number(r.withdraw_total)||0;
      if(!(recv>0||used>0||waste>0||wdt>0)) return;
      (byDate[dt]=byDate[dt]||[]).push({ id:r.item_id, name:m.name, category:m.category, unit:m.unit, order:m.order,
        open:Number(r.open_qty)||0, receive:recv, used:used, waste:waste, balance:Number(r.balance)||0 });
    });
    var dates=Object.keys(byDate).sort(function(a,b){ return String(b).localeCompare(String(a)); });
    var days=dates.map(function(dt){
      var its=byDate[dt].sort(function(a,b){ var ra=CR[a.category]!==undefined?CR[a.category]:9, rb=CR[b.category]!==undefined?CR[b.category]:9; if(ra!==rb)return ra-rb; if((a.order||0)!==(b.order||0))return a.order-b.order; return String(a.id).localeCompare(String(b.id),undefined,{numeric:true}); });
      var tr=0, tu=0; its.forEach(function(x){ tr+=x.receive; tu+=x.used; });
      var d=new Date(dt+'T00:00:00');
      return { date:dt, dateDM:dm(dt), dow:DOW[d.getDay()], count:its.length, totalReceive:tr, totalUsed:tu, items:its };
    });
    lastDays = days; renderCurrent();
  }catch(e){ $('histBody').innerHTML='<div class="empty">โหลดไม่ได้: '+esc(e.message||e)+'</div>'; }
}
function render(res){
  var days = (res && res.days) || [];
  if(!days.length){ $('histBody').innerHTML = '<div class="empty">ไม่มีความเคลื่อนไหวในช่วงนี้</div>'; return; }
  $('histBody').innerHTML = days.map(function(d){
    var rows = d.items.map(function(it){
      var segs = '<span class="seg">เริ่ม <b>'+n(it.open)+'</b></span>';
      if(it.receive>0) segs += '<span class="seg recv">รับ <b>+'+n(it.receive)+'</b></span>';
      if(it.used>0)    segs += '<span class="seg out">เบิก/ใช้ <b>-'+n(it.used)+'</b></span>';
      if(it.waste>0)   segs += '<span class="seg waste">เสีย <b>-'+n(it.waste)+'</b></span>';
      segs += '<span class="seg bal">เหลือ <b>'+n(it.balance)+'</b> '+esc(it.unit||'')+'</span>';
      return '<div class="irow"><div class="nm">'+esc(it.name)+' <span class="ct">'+esc(it.category)+'</span></div><div class="mv">'+segs+'</div></div>';
    }).join('');
    return '<div class="daycard"><div class="dh"><div><div class="dd">'+esc(d.dateDM)+'</div><div class="dw">วัน'+esc(d.dow)+'</div></div>'
      +'<div class="ds">'+d.count+' รายการ<br><span class="r">รับ +'+n(d.totalReceive)+'</span> · <span class="o">ออก -'+n(d.totalUsed)+'</span></div></div>'
      + rows + '</div>';
  }).join('');
}
function renderCurrent(){ if(viewMode==='table') renderTable(lastDays); else render({ days:lastDays }); }
function renderTable(days){
  if(!days.length){ $('histBody').innerHTML = '<div class="empty">ไม่มีความเคลื่อนไหวในช่วงนี้</div>'; return; }
  var head='<tr><th class="l">วันที่</th><th class="l">หมวด</th><th class="l">สินค้า</th><th>เริ่มต้น</th><th>รับเข้า</th><th>เบิก/ใช้</th><th>ของเสีย</th><th>คงเหลือ</th><th class="l">หน่วย</th></tr>';
  var body='';
  days.forEach(function(d){
    d.items.forEach(function(it,i){
      body += '<tr>'
        + '<td class="l dt">'+(i===0?esc(d.dateDM)+' ('+esc(d.dow)+')':'')+'</td>'
        + '<td class="l">'+esc(it.category)+'</td>'
        + '<td class="l">'+esc(it.name)+'</td>'
        + '<td>'+n(it.open)+'</td>'
        + '<td class="r">'+(it.receive>0?'+'+n(it.receive):'')+'</td>'
        + '<td class="o">'+(it.used>0?'-'+n(it.used):'')+'</td>'
        + '<td class="w">'+(it.waste>0?'-'+n(it.waste):'')+'</td>'
        + '<td><b>'+n(it.balance)+'</b></td>'
        + '<td class="l">'+esc(it.unit||'')+'</td>'
      +'</tr>';
    });
  });
  $('histBody').innerHTML = '<div class="tblwrap"><table class="htbl">'+head+body+'</table></div>';
}
function dlCSV(days){
  if(!days.length){ alert('ไม่มีข้อมูลให้บันทึก'); return; }
  function q(v){ v=String(v==null?'':v); return /[",\n]/.test(v) ? '"'+v.replace(/"/g,'""')+'"' : v; }
  var head=['วันที่','วัน','หมวด','สินค้า','หน่วย','เริ่มต้น','รับเข้า','เบิก/ใช้','ของเสีย','คงเหลือสิ้นวัน'];
  var lines=[head.map(q).join(',')];
  days.forEach(function(d){
    d.items.forEach(function(it){
      lines.push([d.date, d.dow, it.category, it.name, it.unit||'', n(it.open), n(it.receive), n(it.used), n(it.waste), n(it.balance)].map(q).join(','));
    });
  });
  var blob=new Blob(['\ufeff'+lines.join('\n')],{type:'text/csv;charset=utf-8;'});
  var a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='ประวัติเคลื่อนไหวสต๊อก_'+(st.start||'')+'_ถึง_'+(st.end||'')+'.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}
$('vtog').addEventListener('click', function(e){ var b=e.target.closest('.vb'); if(!b) return; document.querySelectorAll('#vtog .vb').forEach(function(x){x.classList.remove('on');}); b.classList.add('on'); viewMode=b.dataset.v; renderCurrent(); });
function printHistory(){
  if(!lastDays.length){ toast('ไม่มีข้อมูลให้พิมพ์'); return; }
  var L={all:'ทั้งหมด',Waffle:'Waffle',KUFF:'KUFF',Drink:'Drink',Other:'อื่นๆ'};
  var rows=[], tR=0, tU=0;
  lastDays.forEach(function(d){
    rows.push({ head: d.dateDM+' ('+d.dow+')' });
    d.items.forEach(function(it){
      tR+=Number(it.receive)||0; tU+=Number(it.used)||0;
      var parts=['เริ่ม '+n(it.open)];
      if(it.receive>0) parts.push('รับ +'+n(it.receive));
      if(it.used>0) parts.push('เบิก -'+n(it.used));
      if(it.waste>0) parts.push('เสีย -'+n(it.waste));
      rows.push({ l: it.name, r: 'เหลือ '+n(it.balance), sub: parts.join(' · ')+' '+(it.unit||'') });
    });
  });
  maruPrintSlip({ title:'ประวัติเคลื่อนไหวสต๊อก', meta:['หมวด: '+(L[st.cat]||st.cat), 'ช่วง '+(st.start||'')+' ถึง '+(st.end||'')], rows:rows, summary:'รับเข้ารวม +'+n(tR)+' · เบิก/ใช้รวม -'+n(tU) });
}
$('histPrintBtn').addEventListener('click', printHistory);
$('csvBtn').addEventListener('click', function(){ dlCSV(lastDays); });

setRange('month'); load();
$('presets').addEventListener('click', function(e){
  var b = e.target.closest('.pg'); if(!b) return;
  $('#presets .pg.on') && document.querySelectorAll('#presets .pg').forEach(function(x){x.classList.remove('on');});
  b.classList.add('on'); setRange(b.dataset.r); load();
});
$('fStart').addEventListener('change', function(){ st.start=this.value; document.querySelectorAll('#presets .pg').forEach(function(x){x.classList.remove('on');}); load(); });
$('fEnd').addEventListener('change', function(){ st.end=this.value; document.querySelectorAll('#presets .pg').forEach(function(x){x.classList.remove('on');}); load(); });
$('catChips').addEventListener('click', function(e){
  var b = e.target.closest('.cc'); if(!b) return;
  document.querySelectorAll('#catChips .cc').forEach(function(x){x.classList.remove('on');});
  b.classList.add('on'); st.cat = b.dataset.cat; load();
});
</script>
</body>
</html>
