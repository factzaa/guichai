<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>ตรวจสต๊อก · กุยช่ายสวรรค์</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0B5A31">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700;800&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">

<style>
/* page-specific */
.stock-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.stock-summary .sk{background:#fff;border-radius:12px;padding:11px 13px;text-align:center;}
.stock-summary .sk .v{font-family:'Kanit';font-weight:800;font-size:22px;color:var(--ink);line-height:1;}
.stock-summary .sk .l{font-size:11px;color:var(--ink-2);margin-top:3px;}
.stock-summary .sk.warn .v{color:#1E7A45;}
.stock-summary .sk.bad  .v{color:var(--red);}

.stock-list{display:flex;flex-direction:column;gap:8px;}
.stock-row{background:#fff;border-radius:12px;padding:11px 14px;display:flex;align-items:center;gap:10px;border-left:4px solid transparent;}
.stock-row.low{border-left-color:#1E7A45;background:#FFFBEB;}
.stock-row.out{border-left-color:var(--red);background:#FEF2F2;}
.stock-row .info{flex:1;min-width:0;}
.stock-row .nm{font-family:'Kanit';font-weight:600;font-size:14px;color:var(--ink);}
.stock-row .meta{font-size:11.5px;color:var(--ink-2);margin-top:1px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.stock-row .meta .pill{background:#F2EEDD;color:var(--ink-2);padding:1px 7px;border-radius:8px;font-size:10.5px;font-weight:600;}
.stock-row .meta .pill.mode-count{background:#FEF3C7;color:#92400E;}
.stock-row .st-badge{flex:none;font-family:'Kanit';font-weight:700;font-size:11px;padding:4px 11px;border-radius:20px;align-self:center;white-space:nowrap;}
.st-badge.ok{background:#DCFCE7;color:#15803D;}
.st-badge.low{background:#FEF3C7;color:#92400E;}
.st-badge.out{background:#FEE2E2;color:#B91C1C;}
.stock-row .bal{text-align:right;flex:none;}
.stock-row .bal .n{font-family:'Kanit';font-weight:800;font-size:18px;color:var(--ink);line-height:1;}
.stock-row .bal .u{font-size:11px;color:var(--ink-2);}
.stock-row.low .bal .n{color:#1E7A45;}
.stock-row.out .bal .n{color:var(--red);}
.tblwrap{overflow-x:auto;border-radius:12px;border:1px solid var(--line);}
table.htbl{width:100%;border-collapse:collapse;font-family:'Sarabun';font-size:12.5px;}
table.htbl th,table.htbl td{border:1px solid var(--line);padding:6px 9px;text-align:right;white-space:nowrap;}
table.htbl th{background:#F6F0DB;color:#5A4A00;font-weight:700;}
table.htbl td.l,table.htbl th.l{text-align:left;}
table.htbl td.o{color:#B91C1C;font-weight:700;}table.htbl td.w{color:#92400E;font-weight:700;}
</style>
</head>
<body>

<div class="app">
  <div class="head">
    <h1>ตรวจสต๊อก</h1>
    <div class="sub">กุยช่ายสวรรค์ · คงเหลือ ณ ปัจจุบัน</div>
  </div>

  <div class="sheet">
    <div class="card">
      <div class="h"><span class="ic" style="background:linear-gradient(135deg,#3DD5DC,#1B98A4);" data-icon="store"></span>คงเหลือสต๊อก</div>

      <div class="stock-summary" id="stockSummary"></div>

      <div class="stock-filters">
        <input type="search" id="stockSearch" placeholder="ค้นหารายการ...">
      </div>
      <div class="stock-filters" id="stockCatChips" style="background:transparent;padding:0;margin-top:-4px;">
        <button class="stock-cat-chip on" data-cat="all">ทั้งหมด</button>
        <!-- หมวดโหลดจากฐานอัตโนมัติ (sbBuildCatChips) -->
        <button class="stock-cat-chip" data-cat="low" style="background:#FEF3C7;border-color:#FCD34D;color:#92400E;">⚠️ ของใกล้หมด</button>
        <button class="stock-cat-chip" data-cat="out" style="background:#FEE2E2;border-color:#FCA5A5;color:#B91C1C;">🚫 ของหมด</button>
      </div>

      <div class="vbar">
        <div class="vtog" id="stockVtog"><button class="vb on" data-v="card">การ์ด</button><button class="vb" data-v="table">ตาราง</button></div>
        <div style="display:flex;gap:6px;"><button class="csvb print" id="stockPrintBtn">🖨️ พิมพ์</button><button class="csvb" id="stockCsvBtn">⬇️ CSV</button></div>
      </div>
      <div class="stock-list" id="stockList"><div style="text-align:center;color:var(--ink-2);padding:20px;font-size:13px;">กำลังโหลด...</div></div>
    </div>
    <div class="foot">🥟 ข้อมูลอัปเดตทันทีหลังจากเบิก/รับเข้า/ปิดร้าน</div>
  </div>
</div>

<script src="shared.js"></script>
<script>
injectShell('stockView');
registerSW();

let stockData = { items: [], summary: {}, filter: { cat: 'all', q: '' } };
let viewMode = 'card';

function loadStockView(){
  document.getElementById('stockList').innerHTML = '<div style="text-align:center;color:var(--ink-2);padding:20px;font-size:13px;">กำลังโหลด...</div>';
  apiSWR('getStockBalances', {}, function(res){
      stockData.items = res.items || [];
      stockData.summary = res.summary || {};
      renderStockSummary();
      renderStockList();
    })
    .catch(function(err){
      document.getElementById('stockList').innerHTML = '<div style="color:var(--red);padding:14px;font-size:13px;">โหลดไม่ได้: '+escHtml(err.message)+'<br><br>ถ้ายังไม่ได้รัน <code>setupStock</code> ใน Apps Script editor → ให้รันก่อน</div>';
    });
}
function renderStockSummary(){
  const s = stockData.summary;
  document.getElementById('stockSummary').innerHTML =
    '<div class="sk"><div class="v">'+(s.total||0)+'</div><div class="l">รายการทั้งหมด</div></div>'
    +'<div class="sk warn"><div class="v">'+(s.lowStock||0)+'</div><div class="l">⚠️ ใกล้หมด</div></div>'
    +'<div class="sk bad"><div class="v">'+(s.outOfStock||0)+'</div><div class="l">🚫 หมดสต๊อก</div></div>';
}
function getStockFiltered(){
  const q = (stockData.filter.q || '').toLowerCase();
  const cat = stockData.filter.cat;
  const CAT_ORDER = { Waffle:0, KUFF:1, Drink:2, Other:3 };
  const filtered = stockData.items.filter(function(it){
    if(!it.active) return false;
    if(cat === 'low')      { if(!(it.lowStock && it.balance > 0)) return false; }
    else if(cat === 'out') { if(it.balance > 0) return false; }
    else if(cat !== 'all') { if(it.category !== cat) return false; }
    if(q && it.name.toLowerCase().indexOf(q) < 0) return false;
    return true;
  });
  filtered.sort(function(a,b){
    const ra = (CAT_ORDER[a.category] !== undefined ? CAT_ORDER[a.category] : 9);
    const rb = (CAT_ORDER[b.category] !== undefined ? CAT_ORDER[b.category] : 9);
    if(ra !== rb) return ra - rb;
    return String(a.id||'').localeCompare(String(b.id||''), undefined, { numeric:true });
  });
  return filtered;
}
function stockTableHtml(items){
  var head='<tr><th class="l">รหัส</th><th class="l">สินค้า</th><th class="l">หมวด</th><th>คงเหลือ</th><th class="l">หน่วย</th><th>ขั้นต่ำ</th><th>วันนี้ รับ/เบิก</th><th class="l">สถานะ</th></tr>';
  var body=items.map(function(it){
    var stt = it.balance<=0?'หมด':(it.lowStock?'ใกล้หมด':'ปกติ');
    var stc = it.balance<=0?'o':(it.lowStock?'w':'');
    var td = (it.todayReceive>0?'+'+it.todayReceive:'')+((it.todayReceive>0&&it.todayWithdraw>0)?' / ':'')+(it.todayWithdraw>0?'-'+it.todayWithdraw:'');
    return '<tr>'
      +'<td class="l">'+escHtml(it.id||'')+'</td>'
      +'<td class="l">'+escHtml(it.name)+'</td>'
      +'<td class="l">'+escHtml(it.category||'')+'</td>'
      +'<td><b>'+it.balance+'</b></td>'
      +'<td class="l">'+escHtml(it.unit||'')+'</td>'
      +'<td>'+(it.minStock>0?it.minStock:'')+'</td>'
      +'<td>'+escHtml(td)+'</td>'
      +'<td class="l '+stc+'">'+stt+'</td>'
    +'</tr>';
  }).join('');
  return '<div class="tblwrap"><table class="htbl">'+head+body+'</table></div>';
}
function dlStockCSV(){
  var items=getStockFiltered();
  if(!items.length){ alert('ไม่มีข้อมูลให้บันทึก'); return; }
  function q(v){ v=String(v==null?'':v); return /[",\n]/.test(v) ? '"'+v.replace(/"/g,'""')+'"' : v; }
  var head=['รหัส','สินค้า','หมวด','หน่วย','คงเหลือ','ขั้นต่ำ','วันนี้รับเข้า','วันนี้เบิก','สถานะ'];
  var lines=[head.map(q).join(',')];
  items.forEach(function(it){
    var stt=it.balance<=0?'หมด':(it.lowStock?'ใกล้หมด':'ปกติ');
    lines.push([it.id||'', it.name, it.category||'', it.unit||'', it.balance, it.minStock||0, it.todayReceive||0, it.todayWithdraw||0, stt].map(q).join(','));
  });
  var blob=new Blob(['\ufeff'+lines.join('\n')],{type:'text/csv;charset=utf-8;'});
  var d=new Date(); var ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='ตรวจสต๊อก_'+ds+'.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}
function renderStockList(){
  const filtered = getStockFiltered();
  const box = document.getElementById('stockList');
  if(!filtered.length){
    box.innerHTML = '<div style="text-align:center;color:var(--ink-2);padding:20px;font-size:13px;">ไม่พบรายการ</div>';
    return;
  }
  if(viewMode === 'table'){ box.innerHTML = stockTableHtml(filtered); return; }
  box.innerHTML = filtered.map(function(it){
    const cls = it.balance <= 0 ? 'out' : (it.lowStock ? 'low' : '');
    const modePill = it.mode === 'count' ? '<span class="pill mode-count">โหมด: ชั่งกรัม</span>' : '<span class="pill">โหมด: นับชิ้น</span>';
    const meta = '<span>'+escHtml(it.category)+'</span>'+modePill
      +(it.minStock>0 ? '<span>ขั้นต่ำ '+it.minStock+' '+escHtml(it.unit)+'</span>' : '');
    const todayInfo = (it.todayWithdraw>0 || it.todayReceive>0)
      ? '<div style="font-size:11px;color:var(--ink-2);margin-top:2px;">วันนี้: '
        +(it.todayReceive>0?'<span style="color:var(--green-ok);">+'+it.todayReceive+'</span> ':'')
        +(it.todayWithdraw>0?'<span style="color:var(--red);">-'+it.todayWithdraw+'</span>':'')
        +'</div>'
      : '';
    return '<div class="stock-row '+cls+'">'
      +'<div class="info"><div class="nm">'+escHtml(it.name)+'</div><div class="meta">'+meta+'</div>'+todayInfo+'</div>'
      +'<div class="bal"><div class="n">'+it.balance+'</div><div class="u">'+escHtml(it.unit)+'</div></div>'
      +(cls==='out'?'<span class="st-badge out">หมด</span>':(cls==='low'?'<span class="st-badge low">ใกล้หมด</span>':'<span class="st-badge ok">ปกติ</span>'))
      +'</div>';
  }).join('');
}

document.getElementById('stockSearch').addEventListener('input', function(){
  stockData.filter.q = this.value; renderStockList();
});
document.getElementById('stockCatChips').addEventListener('click', function(e){
  var b = e.target.closest('.stock-cat-chip'); if(!b) return;
  document.querySelectorAll('#stockCatChips .stock-cat-chip').forEach(function(x){x.classList.remove('on');});
  b.classList.add('on');
  stockData.filter.cat = b.dataset.cat;
  renderStockList();
});
sbBuildCatChips('stockCatChips');

document.getElementById('stockVtog').addEventListener('click', function(e){ var b=e.target.closest('.vb'); if(!b) return; document.querySelectorAll('#stockVtog .vb').forEach(function(x){x.classList.remove('on');}); b.classList.add('on'); viewMode=b.dataset.v; renderStockList(); });
function printStock(){
  var items=getStockFiltered();
  if(!items.length){ toast('ไม่มีข้อมูลให้พิมพ์'); return; }
  var L=Object.assign({all:'ทั้งหมด',low:'ใกล้หมด',out:'หมด'}, window.SB_CATMAP||{});
  var CL=Object.assign({}, window.SB_CATMAP||{});
  var cat=L[stockData.filter.cat]||stockData.filter.cat;
  var counts={}; items.forEach(function(it){ counts[it.category]=(counts[it.category]||0)+1; });
  var low=0,out=0,rows=[],curCat=null;
  items.forEach(function(it){
    var c=it.category||'';
    if(c!==curCat){ curCat=c; rows.push({ head: (CL[c]||c||'อื่นๆ')+' ('+(counts[c]||0)+')' }); }
    var st=''; if(it.balance<=0){ st='(หมด)'; out++; } else if(it.lowStock){ st='(ใกล้หมด)'; low++; }
    rows.push({ l: it.name, r: (it.balance+' '+(it.unit||'')), tag: st });
  });
  maruPrintSlip({ title:'ตรวจสต๊อก', meta:['หมวด: '+cat+(stockData.filter.q?(' · ค้นหา: '+stockData.filter.q):'')], rows:rows, summary:'รวม '+items.length+' รายการ · ใกล้หมด '+low+' · หมด '+out });
}
document.getElementById('stockPrintBtn').addEventListener('click', printStock);
document.getElementById('stockCsvBtn').addEventListener('click', dlStockCSV);
renderIcons();
loadStockView();
</script>
</body>
</html>
