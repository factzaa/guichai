<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>กุยช่ายสวรรค์ — แดชบอร์ดยอดขาย (นำร่อง Supabase)</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@500;700;800&family=Sarabun:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{ --yellow:#E6B83C; --cream:#FFFCEF; --ink:#143D26; --line:#ECE6D6; --muted:#8A8170; }
  *{ box-sizing:border-box; }
  body{ margin:0; background:#FAF8F1; color:var(--ink); font-family:"Sarabun",sans-serif; padding:16px; }
  .wrap{ max-width:560px; margin:0 auto; }
  .head{ text-align:center; margin-bottom:14px; }
  .head h1{ font-family:"Kanit"; font-weight:800; font-size:20px; margin:6px 0 2px; }
  .head .sub{ color:var(--muted); font-size:13px; }
  .badge{ display:inline-block; background:var(--yellow); color:var(--ink); font-family:"Kanit"; font-weight:700; font-size:12px; padding:3px 12px; border-radius:999px; }
  .speed{ text-align:center; font-size:12.5px; color:var(--muted); margin-bottom:12px; }
  .speed b{ color:#1a7f37; }
  .kpis{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px; }
  .kpi{ background:#fff; border:1px solid var(--line); border-radius:14px; padding:12px 14px; }
  .kpi .lbl{ font-size:12px; color:var(--muted); }
  .kpi .val{ font-family:"Kanit"; font-weight:800; font-size:22px; margin-top:2px; }
  .kpi .sub{ font-size:11.5px; color:var(--muted); margin-top:2px; }
  .card{ background:#fff; border:1px solid var(--line); border-radius:14px; padding:14px; margin-bottom:12px; }
  .card h2{ font-family:"Kanit"; font-weight:700; font-size:15px; margin:0 0 10px; }
  .bar-row{ display:flex; align-items:center; gap:8px; margin:6px 0; font-size:13px; }
  .bar-row .nm{ width:64px; flex-shrink:0; color:var(--muted); }
  .bar-wrap{ flex:1; background:#F3ECD8; border-radius:6px; height:18px; overflow:hidden; }
  .bar{ height:100%; background:var(--yellow); border-radius:6px; }
  .bar.best{ background:#2E9E5B; }
  .bar-row .vl{ width:74px; text-align:right; font-family:"Kanit"; font-weight:600; }
  .daily{ max-height:230px; overflow-y:auto; }
  .daily .d{ display:flex; justify-content:space-between; padding:6px 2px; border-bottom:1px dashed var(--line); font-size:13px; }
  .err{ background:#FEF2F2; color:#B91C1C; border:1px solid #FCA5A5; border-radius:12px; padding:12px; font-size:13px; }
  .foot{ text-align:center; color:var(--muted); font-size:11.5px; margin-top:10px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div class="badge">🥟 นำร่อง Supabase</div>
    <h1>แดชบอร์ดยอดขาย</h1>
    <div class="sub">กุยช่ายสวรรค์ · ดึงข้อมูลจากฐานข้อมูลใหม่ (PostgreSQL)</div>
  </div>
  <div class="speed" id="speed">กำลังโหลด...</div>
  <div id="content"></div>
  <div class="foot">หน้านี้เป็นตัวทดสอบ — อ่านอย่างเดียวจากตาราง sales</div>
</div>

<script>
// ============================================================
// ⚠️  กุยช่ายสวรรค์ — แก้ URL + KEY ตรงนี้เมื่อมี Supabase ของแบรนด์ใหม่
//    ตอนนี้ยังชี้ไปฐานข้อมูลเดิมของ Maru (ข้อมูลจะปนกัน)
// ============================================================
const SUPABASE_URL = 'https://sfdahyvekfcxoprkshko.supabase.co';
const SUPABASE_KEY = 'sb_publishable_632DkQ4uOHjIGWr-_c7hCA_WgFHe3jT';
const DOW = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];

function baht(n){ return '฿' + Math.round(Number(n)||0).toLocaleString('en-US'); }
function thDate(s){ const M=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.']; const p=String(s).split('-'); return parseInt(p[2])+' '+M[parseInt(p[1])-1]; }

async function load(){
  const t0 = performance.now();
  try{
    const url = SUPABASE_URL + '/rest/v1/sales?select=sale_date,total&order=sale_date.asc';
    const res = await fetch(url, { headers:{ apikey:SUPABASE_KEY, Authorization:'Bearer '+SUPABASE_KEY } });
    if(!res.ok) throw new Error('HTTP '+res.status+' — '+(await res.text()).slice(0,200));
    const rows = await res.json();
    const ms = Math.round(performance.now() - t0);
    render(rows, ms);
  }catch(err){
    document.getElementById('speed').textContent = '';
    document.getElementById('content').innerHTML = '<div class="err">โหลดข้อมูลไม่สำเร็จ: '+err.message+'<br><br>เช็ก: (1) รัน SQL เปิด RLS + policy อ่าน sales แล้วหรือยัง (2) key ถูกไหม</div>';
  }
}

function render(rows, ms){
  document.getElementById('speed').innerHTML = 'โหลด '+rows.length+' วัน ใน <b>'+ms+' ms</b> ⚡ (ไม่ต้องรอ cold start)';
  if(!rows.length){ document.getElementById('content').innerHTML = '<div class="err">ยังไม่มีข้อมูลในตาราง sales</div>'; return; }

  let total=0, dSum=[0,0,0,0,0,0,0], dCnt=[0,0,0,0,0,0,0];
  rows.forEach(function(r){
    const v = Number(r.total)||0; total += v;
    const di = new Date(r.sale_date+'T00:00:00+07:00').getDay();
    dSum[di]+=v; dCnt[di]++;
  });
  const days = rows.length, avg = total/days;
  // เฉลี่ยรายวันในสัปดาห์ + หาวันขายดี
  let bestI=-1, bestAvg=-1, dowAvg=[];
  for(let i=0;i<7;i++){ const a = dCnt[i]? dSum[i]/dCnt[i] : 0; dowAvg[i]=a; if(dCnt[i]>0 && a>bestAvg){ bestAvg=a; bestI=i; } }
  const mx = Math.max.apply(null, dowAvg);

  let html = '<div class="kpis">'
    + kpi('ยอดขายรวม', baht(total), days+' วัน')
    + kpi('เฉลี่ย/วัน', baht(avg), 'รวมทุกวัน')
    + kpi('วันขายดีประจำ', bestI>=0?('วัน'+DOW[bestI]):'-', bestI>=0?('เฉลี่ย '+baht(bestI>=0?dowAvg[bestI]:0)+'/วัน'):'')
    + kpi('จำนวนวันเปิด', days+' วัน', 'ในฐานข้อมูล')
    + '</div>';

  // กราฟเฉลี่ยตามวันในสัปดาห์
  html += '<div class="card"><h2>ยอดขายเฉลี่ยตามวันในสัปดาห์</h2>';
  for(let i=0;i<7;i++){
    const w = mx>0 ? Math.round(dowAvg[i]/mx*100) : 0;
    html += '<div class="bar-row"><div class="nm">'+DOW[i]+'</div>'
      + '<div class="bar-wrap"><div class="bar'+(i===bestI?' best':'')+'" style="width:'+w+'%"></div></div>'
      + '<div class="vl">'+baht(dowAvg[i])+'</div></div>';
  }
  html += '</div>';

  // รายวันล่าสุด
  html += '<div class="card"><h2>ยอดขายรายวัน (ล่าสุดบนสุด)</h2><div class="daily">';
  rows.slice().reverse().forEach(function(r){
    html += '<div class="d"><span>'+thDate(r.sale_date)+'</span><b>'+baht(r.total)+'</b></div>';
  });
  html += '</div></div>';

  document.getElementById('content').innerHTML = html;
}

function kpi(l,v,s){ return '<div class="kpi"><div class="lbl">'+l+'</div><div class="val">'+v+'</div><div class="sub">'+(s||'')+'</div></div>'; }

load();
</script>
</body>
</html>
